# =====================================================================
# GLOBAL PROJECT CONFIGURATION
# =====================================================================
# File Name: config.yaml
# Purpose: Holds all system settings. Modifying this file adjusts the
#          application behavior without changing the underlying Python code.

model_settings:
  architecture: "DenseNet121"
  weights_path: "models/kub_model.onnx"
  confidence_threshold: 0.85
  num_classes: 14

image_settings:
  target_width: 224
  target_height: 224
  channels: 3  # 1 for Grayscale, 3 for RGB
  clahe_clip_limit: 2.0
  clahe_tile_size: 8
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

server_settings:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  timeout: 60

# 14-class names (CheXNet standard)
class_names:
  - "Atelectasis"
  - "Cardiomegaly"
  - "Effusion"
  - "Infiltration"
  - "Mass"
  - "Nodule"
  - "Pneumonia"
  - "Pneumothorax"
  - "Consolidation"
  - "Edema"
  - "Emphysema"
  - "Fibrosis"
  - "Pleural_Thickening"
  - "Hernia"

# Data paths
data_paths:
  normal: "data/normal"
  abnormal: "data/abnormal"
